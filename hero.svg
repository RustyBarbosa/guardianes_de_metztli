<svg xmlns="http://w3.org" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Degradado para el fondo espacial profundo -->
    <linearGradient id="spaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050515" />
      <stop offset="50%" stop-color="#0b0f26" />
      <stop offset="100%" stop-color="#1a1235" />
    </linearGradient>

    <!-- Degradado neón cian/azul para los trazos vectoriales -->
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Filtro de resplandor neón (Glow effect) -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo del lienzo -->
  <rect width="800" height="800" fill="url(#spaceGrad)" />

  <!-- Pequeñas estrellas/puntos de fondo sutiles -->
  <g fill="#ffffff" opacity="0.3">
    <circle cx="150" cy="200" r="1.5" />
    <circle cx="650" cy="150" r="2" />
    <circle cx="200" cy="600" r="1" />
    <circle cx="700" cy="550" r="2.5" />
    <circle cx="100" cy="450" r="1.5" />
  </g>

  <!-- CONTENEDOR CENTRAL DEL LOGO (Luna de estilo glifo Maya con IA) -->
  <g transform="translate(400, 380)" stroke="url(#neonGlow)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    
    <!-- 1. Silueta de la Luna Creciente Externa (Estilo glifo tradicional) -->
    <path d="M 0,-220 
             A 220,220 0 0,1 150,160 
             A 220,220 0 0,1 -150,160 
             A 170,170 0 0,0 0,-220 Z" 
          stroke-width="5" />

    <!-- 2. Rostro Interior de la Deidad Lunar (Perfil estilo Códice Maya) -->
    <!-- Frente, nariz pronunciada, labios, barbilla y tocado geométrico modernizado -->
    <path d="M -20,-140 
             C -60,-140 -80,-110 -70,-80 
             C -90,-80 -110,-50 -90,-20 
             L -110,-10 
             C -120,10 -100,20 -85,15 
             C -95,30 -90,50 -70,60 
             C -50,70 -20,65 -10,40" />
             
    <!-- Ojo almendrado con diseño de circuito o patrón digital (Fusión IA) -->
    <path d="M -45,-45 C -30,-55 -15,-45 -15,-45 C -15,-45 -30,-35 -45,-45 Z" fill="url(#neonGlow)" opacity="0.2"/>
    <circle cx="-30" cy="-45" r="4" fill="url(#neonGlow)" />
    <!-- Línea tecnológica que sale del ojo -->
    <path d="M -30,-41 L -30,-15 L -10,-5" stroke-width="2" />

    <!-- 3. Detalles Geométricos Internos y Círculos de Registro Maya (Gírula) -->
    <!-- Patrón de tres puntos tradicionales en la ceja/frente -->
    <circle cx="-45" cy="-85" r="5" fill="url(#neonGlow)" />
    <circle cx="-30" cy="-90" r="5" fill="url(#neonGlow)" />
    <circle cx="-15" cy="-90" r="5" fill="url(#neonGlow)" />

    <!-- Glifos geométricos abstractos en la parte posterior (Líneas de circuito tecno-maya) -->
    <path d="M 40,-120 L 80,-120 A 10,10 0 0,1 90,-110 L 90,-70" />
    <rect x="50" y="-60" width="30" height="30" rx="5" />
    <circle cx="65" cy="-45" r="4" fill="url(#neonGlow)" />
    
    <path d="M 60,0 L 110,30 L 90,70" />
    <path d="M 20,80 L 50,110 L 10,130" />
    
    <!-- Escalones geométricos tipo pirámide integrados en la base del rostro -->
    <path d="M -50,90 L -20,90 L -20,110 L 10,110 L 10,130 L 40,130" stroke-width="3" />
  </g>

  <!-- TEXTO SUTIL "MARTHA" EN LA ESQUINA INFERIOR DERECHA -->
  <text x="760" y="760" 
        text-anchor="end" 
        font-family="'Lexend', 'Segoe UI', sans-serif" 
        font-size="14" 
        font-weight="300" 
        fill="#00f2fe" 
        opacity="0.6" 
        letter-spacing="1.5">
    Martha
  </text>
</svg>